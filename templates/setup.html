<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="csrf-token" content="{{ csrf_token() }}" />
    <title>WebControl - Initial Setup</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='images/icon.png') }}">
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 20px;
            box-sizing: border-box;
        }

        .setup-container {
            background: rgba(255, 255, 255, 0.95);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            text-align: center;
            width: 100%;
            max-width: 500px;
            animation: slideUp 0.8s ease-out;
        }

        @keyframes slideUp {
            from { transform: translateY(50px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .setup-container h1 {
            color: #667eea;
            margin: 0 0 10px 0;
            font-size: 2.5em;
        }

        .setup-container p {
            color: #666;
            margin: 0 0 30px 0;
            font-size: 1.1em;
        }

        .setup-container input,
        .setup-container select {
            width: 100%;
            padding: 15px;
            margin: 15px 0;
            border: 2px solid #ddd;
            border-radius: 10px;
            font-size: 1em;
            box-sizing: border-box;
            transition: all 0.3s ease;
        }

        .setup-container input:focus,
        .setup-container select:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 10px rgba(102, 126, 234, 0.3);
        }

        .setup-container button {
            width: 100%;
            padding: 15px;
            margin-top: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 1.1em;
            font-weight: bold;
            transition: all 0.3s ease;
        }

        .setup-container button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
        }

        .error {
            color: #e74c3c;
            margin-bottom: 15px;
            font-weight: bold;
            padding: 10px;
            background: rgba(231, 76, 60, 0.1);
            border-radius: 8px;
        }

        .info {
            color: #3498db;
            margin-bottom: 20px;
            padding: 15px;
            background: rgba(52, 152, 219, 0.1);
            border-radius: 8px;
            font-size: 0.95em;
        }
    </style>
</head>
<body>
    <div class="setup-container">
        <h1>🚀 Welcome to WebControl</h1>
        <p>Initial Setup</p>
        
        <div class="info">
            No users found. Please create the first administrator account.
        </div>
        
        {% if error %}
            <div class="error">{{ error }}</div>
        {% endif %}
        
        <form method="post">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
            <input type="text" name="username" placeholder="Username (min 3 characters)" required minlength="3" autocomplete="username">
            <input type="password" name="password" placeholder="Password (min 6 characters)" required minlength="6" autocomplete="new-password">
            <input type="password" name="password_confirm" placeholder="Confirm Password" required minlength="6" autocomplete="new-password">
            <select name="language">
                <option value="ru">Русский</option>
                <option value="en">English</option>
            </select>
            <button type="submit">Create Administrator</button>
        </form>
    </div>
</body>
</html>

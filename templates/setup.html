{% extends "base.html" %}

{% block title %}WebControl - Setup{% endblock %}

{% block head %}
<style>
    body {
        margin: 0;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background: #1a1a2e;
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        overflow: hidden;
    }

    .login-container {
        background: #16213e;
        padding: 40px;
        border-radius: 8px;
        box-shadow: 0 4px 16px rgba(0, 0, 0, 0.3);
        text-align: center;
        width: 100%;
        max-width: 380px;
    }

    .login-container h2 {
        color: #fff;
        margin: 0 0 10px 0;
        font-size: 1.8em;
        font-weight: 500;
    }

    .login-container p {
        color: #6c7a89;
        margin: 0 0 20px 0;
        font-size: 0.95em;
    }

    .login-container input,
    .login-container select {
        width: 100%;
        padding: 12px;
        margin: 10px 0;
        border: 1px solid #2a3f5f;
        border-radius: 4px;
        font-size: 1em;
        box-sizing: border-box;
        background: #1a1a2e;
        color: #fff;
        outline: none;
    }

    .login-container input::placeholder {
        color: #6c7a89;
    }

    .login-container input:focus,
    .login-container select:focus {
        border-color: #4a90e2;
    }

    .login-container select {
        cursor: pointer;
    }

    .login-container button {
        width: 100%;
        padding: 12px;
        margin-top: 20px;
        background: #4a90e2;
        color: #fff;
        border: none;
        border-radius: 4px;
        cursor: pointer;
        font-size: 1em;
        font-weight: 500;
    }

    .login-container button:hover {
        background: #357abd;
    }

    .error {
        color: #ff6b6b;
        background: rgba(255, 107, 107, 0.1);
        border: 1px solid rgba(255, 107, 107, 0.3);
        padding: 10px;
        border-radius: 4px;
        margin-bottom: 15px;
        font-size: 0.9em;
    }

    .info {
        color: #4a90e2;
        background: rgba(74, 144, 226, 0.1);
        border: 1px solid rgba(74, 144, 226, 0.3);
        padding: 12px;
        border-radius: 4px;
        margin-bottom: 20px;
        font-size: 0.9em;
    }

    .login-container button:disabled {
        background: #6c7a89;
        cursor: not-allowed;
    }
</style>
{% endblock %}

{% block content %}
    <div class="login-container">
        <h2>WebControl</h2>
        <p>Create Administrator Account</p>
        
        <div class="info">
            No users found. Please create the first administrator account.
        </div>
        
        {% if error %}
            <div class="error">{{ error }}</div>
        {% endif %}
        
        <form method="post" id="setupForm">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
            <input type="text" name="username" placeholder="Username (min 3 characters)" required minlength="3" autocomplete="username" autofocus>
            <input type="password" name="password" placeholder="Password (min 6 characters)" required minlength="6" autocomplete="new-password">
            <input type="password" name="password_confirm" placeholder="Confirm Password" required minlength="6" autocomplete="new-password">
            <select name="language">
                <option value="ru">Русский</option>
                <option value="en">English</option>
            </select>
            <button type="submit" id="submitBtn">Create Administrator</button>
        </form>
    </div>

    <script>
        document.getElementById('setupForm').addEventListener('submit', function(e) {
            const btn = document.getElementById('submitBtn');
            const form = e.target;
            
            // Проверка валидности формы
            if (!form.checkValidity()) {
                return;
            }
            
            // Проверка совпадения паролей
            const password = form.querySelector('[name="password"]').value;
            const passwordConfirm = form.querySelector('[name="password_confirm"]').value;
            
            if (password !== passwordConfirm) {
                return;
            }
            
            btn.disabled = true;
            btn.textContent = 'Creating...';
        });
    </script>
{% endblock %}

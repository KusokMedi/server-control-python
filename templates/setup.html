<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="csrf-token" content="{{ csrf_token() }}" />
    <title>WebControl - Initial Setup</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='images/icon.png') }}">
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #1a1a2e;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }

        .setup-container {
            background: #16213e;
            padding: 40px;
            border-radius: 8px;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.3);
            text-align: center;
            width: 100%;
            max-width: 420px;
        }

        .setup-container h1 {
            color: #fff;
            margin: 0 0 10px 0;
            font-size: 1.8em;
            font-weight: 500;
        }

        .setup-container p {
            color: #6c7a89;
            margin: 0 0 20px 0;
            font-size: 1em;
        }

        .setup-container input,
        .setup-container select {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid #2a3f5f;
            border-radius: 4px;
            font-size: 1em;
            box-sizing: border-box;
            background: #1a1a2e;
            color: #fff;
            outline: none;
        }

        .setup-container input:focus,
        .setup-container select:focus {
            border-color: #4a90e2;
        }

        .setup-container button {
            width: 100%;
            padding: 12px;
            margin-top: 20px;
            background: #4a90e2;
            color: #fff;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 1em;
            font-weight: 500;
        }

        .setup-container button:hover {
            background: #357abd;
        }

        .error {
            color: #ff6b6b;
            background: rgba(255, 107, 107, 0.1);
            border: 1px solid rgba(255, 107, 107, 0.3);
            padding: 10px;
            border-radius: 4px;
            margin-bottom: 15px;
            font-size: 0.9em;
        }

        .info {
            color: #4a90e2;
            background: rgba(74, 144, 226, 0.1);
            border: 1px solid rgba(74, 144, 226, 0.3);
            padding: 12px;
            border-radius: 4px;
            margin-bottom: 20px;
            font-size: 0.9em;
        }
    </style>
</head>
<body>
    <div class="setup-container">
        <h1>WebControl Setup</h1>
        <p>Create Administrator Account</p>
        
        <div class="info">
            No users found. Please create the first administrator account.
        </div>
        
        {% if error %}
            <div class="error">{{ error }}</div>
        {% endif %}
        
        <form method="post">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
            <input type="text" name="username" placeholder="Username (min 3 characters)" required minlength="3" autocomplete="username">
            <input type="password" name="password" placeholder="Password (min 6 characters)" required minlength="6" autocomplete="new-password">
            <input type="password" name="password_confirm" placeholder="Confirm Password" required minlength="6" autocomplete="new-password">
            <select name="language">
                <option value="ru">Русский</option>
                <option value="en">English</option>
            </select>
            <button type="submit">Create Administrator</button>
        </form>
    </div>
</body>
</html>

{% extends "base.html" %}

{% block title %}WebControl - Login{% endblock %}

{% block head %}
<style>
    body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        padding: 20px;
        box-sizing: border-box;
    }

    .login-container {
        background: rgba(255, 255, 255, 0.05);
        backdrop-filter: blur(10px);
        padding: 50px 40px;
        border-radius: 20px;
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        border: 1px solid rgba(255, 255, 255, 0.1);
        text-align: center;
        width: 100%;
        max-width: 420px;
        animation: slideUp 0.6s ease-out;
    }

    @keyframes slideUp {
        from { transform: translateY(30px); opacity: 0; }
        to { transform: translateY(0); opacity: 1; }
    }

    .logo {
        width: 80px;
        height: 80px;
        margin: 0 auto 20px;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        border-radius: 20px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 40px;
        box-shadow: 0 10px 30px rgba(102, 126, 234, 0.3);
    }

    .login-container h2 {
        color: #fff;
        margin: 0 0 10px 0;
        font-size: 2em;
        font-weight: 600;
    }

    .login-container .subtitle {
        color: rgba(255, 255, 255, 0.6);
        margin: 0 0 40px 0;
        font-size: 0.95em;
    }

    .input-group {
        position: relative;
        margin: 25px 0;
    }

    .input-group i {
        position: absolute;
        left: 20px;
        top: 50%;
        transform: translateY(-50%);
        color: rgba(255, 255, 255, 0.5);
        font-size: 18px;
    }

    .login-container input {
        width: 100%;
        padding: 18px 20px 18px 55px;
        border: 2px solid rgba(255, 255, 255, 0.1);
        border-radius: 12px;
        font-size: 1em;
        box-sizing: border-box;
        background: rgba(255, 255, 255, 0.05);
        color: #fff;
        transition: all 0.3s ease;
        outline: none;
    }

    .login-container input::placeholder {
        color: rgba(255, 255, 255, 0.4);
    }

    .login-container input:focus {
        border-color: #667eea;
        background: rgba(255, 255, 255, 0.08);
        box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.1);
    }

    .login-container button {
        width: 100%;
        padding: 18px;
        margin-top: 30px;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: #fff;
        border: none;
        border-radius: 12px;
        cursor: pointer;
        font-size: 1.05em;
        font-weight: 600;
        transition: all 0.3s ease;
        box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
    }

    .login-container button:hover {
        transform: translateY(-2px);
        box-shadow: 0 6px 20px rgba(102, 126, 234, 0.6);
    }

    .login-container button:active {
        transform: translateY(0);
    }

    .error {
        color: #ff6b6b;
        background: rgba(255, 107, 107, 0.1);
        border: 1px solid rgba(255, 107, 107, 0.3);
        padding: 12px;
        border-radius: 10px;
        margin-bottom: 20px;
        font-size: 0.9em;
        animation: shake 0.5s ease-in-out;
    }

    @keyframes shake {
        0%, 100% { transform: translateX(0); }
        25% { transform: translateX(-10px); }
        75% { transform: translateX(10px); }
    }

    .footer {
        margin-top: 30px;
        color: rgba(255, 255, 255, 0.4);
        font-size: 0.85em;
    }

    @media (max-width: 480px) {
        body {
            padding: 10px;
        }
        .login-container {
            padding: 40px 30px;
        }
        .login-container h2 {
            font-size: 1.6em;
        }
    }
</style>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
{% endblock %}

{% block content %}
    <div class="login-container">
        <div class="logo">🔐</div>
        <h2>WebControl</h2>
        <p class="subtitle">Remote Computer Control System</p>
        
        {% if error %}
            <div class="error">
                <i class="fas fa-exclamation-circle"></i> {{ error }}
            </div>
        {% endif %}
        
        <form method="post">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
            
            <div class="input-group">
                <i class="fas fa-user"></i>
                <input type="text" name="username" placeholder="Username" required autocomplete="username" autofocus>
            </div>
            
            <div class="input-group">
                <i class="fas fa-lock"></i>
                <input type="password" name="password" placeholder="Password" required autocomplete="current-password">
            </div>
            
            <button type="submit">
                <i class="fas fa-sign-in-alt"></i> Sign In
            </button>
        </form>
        
        <div class="footer">
            Secure access to your computer
        </div>
    </div>
{% endblock %}
